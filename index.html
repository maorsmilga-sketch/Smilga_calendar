<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="סמילגה">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%234F46E5'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle'%3E%F0%9F%93%85%3C/text%3E%3C/svg%3E">
  <title>לוח שנה משפחת סמילגה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Heebo', sans-serif;
  background: #F1F5F9;
  color: #1E293B;
  min-height: 100dvh;
  direction: rtl;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* ===== VARIABLES ===== */
:root {
  --maor:        #2563EB;
  --maor-light:  #DBEAFE;
  --ravit:       #DB2777;
  --ravit-light: #FCE7F3;
  --primary:     #4F46E5;
  --primary-l:   #EEF2FF;
  --success:     #10B981;
  --danger:      #EF4444;
  --warning:     #F59E0B;
  --bg:          #F1F5F9;
  --card:        #FFFFFF;
  --border:      #E2E8F0;
  --text:        #1E293B;
  --text-s:      #64748B;
  --text-m:      #94A3B8;
  --r:           14px;
  --r-s:         10px;
  --r-xs:        6px;
  --sh:          0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
  --sh-m:        0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
  --sh-lg:       0 10px 25px rgba(0,0,0,.12);
  --hdr:         58px;
  --tabs:        46px;
  --dnav:        46px;
  --bnav:        66px;
}

/* ===== SCREENS ===== */
.screen { position: fixed; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ===== AUTH ===== */
#auth-screen {
  background: linear-gradient(150deg, #0F0C29 0%, #302B63 50%, #24243E 100%);
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 20px;
}
.auth-stars {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.auth-stars::before, .auth-stars::after {
  content: '';
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  opacity: .07;
}
.auth-stars::before { background: #818CF8; top: -60px; right: -60px; width: 300px; height: 300px; }
.auth-stars::after  { background: #C084FC; bottom: 60px; left: -40px; }

.auth-header {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 36px; z-index: 1;
}
.auth-logo {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #6366F1, #8B5CF6);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(99,102,241,.45);
}
.auth-title { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -.5px; }
.auth-sub   { font-size: 14px; color: rgba(255,255,255,.5); margin-top: 4px; }

.auth-prompt {
  font-size: 17px; font-weight: 600;
  color: rgba(255,255,255,.85);
  margin-bottom: 28px; z-index: 1; text-align: center;
}
#pattern-canvas { touch-action: none; cursor: pointer; z-index: 1; border-radius: 8px; }
.auth-msg {
  margin-top: 20px; min-height: 22px;
  font-size: 14px; font-weight: 500;
  color: rgba(255,255,255,.45);
  z-index: 1; transition: color .2s;
  text-align: center;
}
.auth-msg.error   { color: #FCA5A5; }
.auth-msg.success { color: #6EE7B7; }
.auth-hint {
  margin-top: 28px; z-index: 1;
  background: rgba(255,255,255,.07);
  border-radius: 12px; padding: 12px 20px;
  font-size: 12px; color: rgba(255,255,255,.45);
  text-align: center; line-height: 1.7;
}

/* ===== APP SCREEN ===== */
#app-screen { background: var(--bg); }

/* ===== HEADER ===== */
#app-header {
  height: var(--hdr);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px;
  flex-shrink: 0;
  box-shadow: 0 1px 0 var(--border);
  z-index: 50;
  padding-top: env(safe-area-inset-top, 0);
}
.hdr-user { display: flex; align-items: center; gap: 9px; }
.user-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.hdr-name { font-size: 14px; font-weight: 600; color: var(--text); }
.hdr-title { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
.hdr-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: none;
  background: var(--bg); color: var(--text-s);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 17px; transition: all .15s;
}
.icon-btn:active { transform: scale(.88); }

/* ===== VIEW TABS ===== */
#view-tabs {
  height: var(--tabs);
  background: var(--card);
  display: flex; padding: 5px 10px; gap: 4px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.vtab {
  flex: 1; border: none; background: transparent;
  border-radius: var(--r-s);
  font-family: 'Heebo', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--text-s); cursor: pointer; transition: all .2s;
}
.vtab.active { background: var(--primary-l); color: var(--primary); font-weight: 700; }

/* ===== DATE NAV ===== */
#date-nav {
  height: var(--dnav);
  background: var(--card);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 6px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dnav-btn {
  width: 38px; height: 38px; border: none; background: transparent;
  color: var(--text-s); font-size: 22px; cursor: pointer;
  border-radius: var(--r-s); display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.dnav-btn:active { background: var(--bg); }
#date-title {
  font-size: 15px; font-weight: 700; color: var(--text);
  cursor: pointer; padding: 5px 12px; border-radius: var(--r-s);
  transition: background .15s; user-select: none;
}
#date-title:active { background: var(--bg); }

/* ===== MAIN CONTENT ===== */
#main-content {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: var(--bnav);
}

/* ===== FILTER BAR ===== */
#filter-bar {
  padding: 7px 14px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#filter-bar::-webkit-scrollbar { display: none; }
.fchip {
  padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
  cursor: pointer; border: 1.5px solid var(--border);
  background: var(--card); color: var(--text-s); transition: all .15s;
  flex-shrink: 0;
}
.fchip.on { border-color: var(--primary); background: var(--primary-l); color: var(--primary); }

/* ===== DASHBOARD ===== */
.dash { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.dash-card {
  background: var(--card); border-radius: var(--r);
  padding: 14px 16px; box-shadow: var(--sh);
}
.dash-hd {
  font-size: 13px; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
}
.up-item {
  display: flex; align-items: center; gap: 11px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.up-item:last-child { border-bottom: none; padding-bottom: 0; }
.up-bar { width: 3px; height: 34px; border-radius: 2px; flex-shrink: 0; }
.up-info { flex: 1; min-width: 0; }
.up-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.up-meta { font-size: 12px; color: var(--text-s); margin-top: 1px; }
.up-when { font-size: 12px; font-weight: 700; color: var(--text-m); flex-shrink: 0; }

.bday-item {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.bday-item:last-child { border-bottom: none; }
.bday-av {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #EC4899, #F43F5E);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.bday-info { flex: 1; }
.bday-name { font-size: 14px; font-weight: 600; color: var(--text); }
.bday-sub  { font-size: 12px; color: var(--text-s); margin-top: 1px; }
.bday-badge {
  background: linear-gradient(135deg, #EC4899, #F43F5E);
  color: #fff; border-radius: 20px;
  padding: 3px 11px; font-size: 12px; font-weight: 700; white-space: nowrap;
}
.empty-dash { text-align: center; padding: 20px 0; color: var(--text-m); font-size: 14px; }

/* ===== MONTH VIEW ===== */
.mv { padding: 10px 10px 6px; }
.mv-heads {
  display: grid; grid-template-columns: repeat(7, 1fr);
  margin-bottom: 4px;
}
.mv-head { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-m); padding: 4px 0; }
.mv-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mv-cell {
  min-height: 64px; background: var(--card);
  border-radius: var(--r-xs); padding: 4px 3px;
  cursor: pointer; transition: background .12s;
  border: 1.5px solid transparent; overflow: hidden;
}
.mv-cell:active { background: #EFF6FF; }
.mv-cell.other  { background: transparent; opacity: .35; pointer-events: none; }
.mv-cell.today  { border-color: var(--primary); }
.mv-dn {
  font-size: 12px; font-weight: 600; color: var(--text-s);
  line-height: 1; margin-bottom: 2px;
}
.mv-cell.today .mv-dn {
  width: 20px; height: 20px;
  background: var(--primary); color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
}
.mv-evts { display: flex; flex-direction: column; gap: 1px; }
.mv-chip {
  font-size: 9.5px; font-weight: 600; color: #fff;
  border-radius: 3px; padding: 1px 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  line-height: 1.5;
}
.mv-more { font-size: 9px; color: var(--text-m); padding: 1px 2px; }

/* ===== WEEK VIEW ===== */
.wv { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.wv-wrap { min-width: 480px; }
.wv-hdr {
  display: grid; grid-template-columns: 42px repeat(7, 1fr);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.wv-hcell { text-align: center; padding: 6px 2px; }
.wv-dname { font-size: 10px; font-weight: 600; color: var(--text-m); }
.wv-dnum {
  font-size: 15px; font-weight: 800; color: var(--text);
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 1px auto 0;
}
.wv-dnum.tod { background: var(--primary); color: #fff; }
.wv-body { display: grid; grid-template-columns: 42px repeat(7, 1fr); }
.wv-tcol { display: flex; flex-direction: column; }
.wv-tlbl {
  height: 44px; font-size: 10px; color: var(--text-m);
  padding: 3px 6px 0; border-top: 1px solid var(--border);
  flex-shrink: 0; text-align: right;
}
.wv-dcol { position: relative; border-right: 1px solid var(--border); }
.wv-slot { height: 44px; border-top: 1px solid var(--border); }
.wv-evt {
  position: absolute; left: 2px; right: 2px;
  border-radius: 5px; padding: 2px 4px;
  font-size: 10px; font-weight: 700; color: #fff;
  overflow: hidden; cursor: pointer; z-index: 5;
  box-shadow: var(--sh);
}

/* ===== DAY VIEW ===== */
.dv { }
.dv-allday {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  background: var(--card);
}
.dv-allday-lbl { font-size: 11px; font-weight: 700; color: var(--text-m); margin-bottom: 5px; }
.dv-wrap { display: grid; grid-template-columns: 42px 1fr; }
.dv-dcol { position: relative; }
.dv-evt {
  position: absolute; left: 4px; right: 4px;
  border-radius: var(--r-s); padding: 4px 8px;
  font-size: 11px; font-weight: 700; color: #fff;
  overflow: hidden; cursor: pointer; z-index: 5;
}

/* ===== LIST VIEW ===== */
.lv { padding: 12px; }
.lv-dg { margin-bottom: 14px; }
.lv-dhdr {
  font-size: 12px; font-weight: 800; color: var(--text-s);
  padding: 0 4px 7px;
  display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: .3px;
}
.lv-dhdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.lv-card {
  background: var(--card); border-radius: var(--r);
  padding: 11px 13px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 11px;
  cursor: pointer; transition: transform .12s;
  box-shadow: var(--sh); border-right: 4px solid;
}
.lv-card:active { transform: scale(.99); }
.lv-time { font-size: 12px; font-weight: 800; color: var(--text-s); text-align: center; min-width: 46px; flex-shrink: 0; }
.lv-info { flex: 1; min-width: 0; }
.lv-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lv-meta { font-size: 12px; color: var(--text-s); margin-top: 1px; display: flex; gap: 8px; flex-wrap: wrap; }
.lv-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

/* ===== BOTTOM NAV ===== */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--bnav);
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 50;
  box-shadow: 0 -2px 12px rgba(0,0,0,.06);
}
.nbtn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  height: 100%; border: none; background: transparent;
  cursor: pointer; color: var(--text-m); font-family: 'Heebo', sans-serif;
  font-size: 10px; font-weight: 500; border-radius: var(--r-s);
  transition: color .15s; padding: 6px 0;
}
.nbtn:active { background: var(--bg); }
.nbtn.active { color: var(--primary); }
.nbtn svg { width: 21px; height: 21px; }
.nadd {
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  border: none; color: #fff; font-size: 26px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(79,70,229,.4);
  transition: transform .2s, box-shadow .2s; flex-shrink: 0;
}
.nadd:active { transform: scale(.9); box-shadow: 0 2px 8px rgba(79,70,229,.3); }

/* ===== MODAL ===== */
.moverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 200; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.moverlay.open { opacity: 1; pointer-events: all; }
.msheet {
  width: 100%; max-height: 94dvh;
  background: var(--card); border-radius: var(--r) var(--r) 0 0;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  overflow: hidden;
}
.moverlay.open .msheet { transform: translateY(0); }
.mhandle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
.mhdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px; flex-shrink: 0;
}
.mtitle { font-size: 18px; font-weight: 800; color: var(--text); }
.mclose {
  width: 30px; height: 30px; border: none; background: var(--bg);
  border-radius: 50%; cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; color: var(--text-s);
}
.mbody {
  flex: 1; overflow-y: auto; padding: 0 18px 16px;
  -webkit-overflow-scrolling: touch;
}
.mftr {
  padding: 11px 18px;
  padding-bottom: max(11px, env(safe-area-inset-bottom, 11px));
  border-top: 1px solid var(--border);
  display: flex; gap: 9px; flex-shrink: 0;
}

/* ===== FORM ===== */
.fg { margin-bottom: 15px; }
.fg:last-child { margin-bottom: 0; }
.fl { display: block; font-size: 13px; font-weight: 700; color: var(--text-s); margin-bottom: 5px; }
.fi {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: var(--r-s);
  font-family: 'Heebo', sans-serif; font-size: 15px;
  color: var(--text); background: var(--card); outline: none;
  transition: border-color .15s; direction: rtl;
}
.fi:focus { border-color: var(--primary); }
.fi::placeholder { color: var(--text-m); }
textarea.fi { resize: none; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

/* Assigned toggle */
.assign-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.assign-opt {
  padding: 10px 8px; border: 2px solid var(--border);
  border-radius: var(--r-s); cursor: pointer; text-align: center;
  transition: all .15s;
}
.assign-opt.sel-m { border-color: var(--maor); background: var(--maor-light); }
.assign-opt.sel-r { border-color: var(--ravit); background: var(--ravit-light); }
.assign-name { font-size: 15px; font-weight: 800; }
.assign-sub  { font-size: 11px; color: var(--text-m); margin-top: 1px; }

/* ===== BUTTONS ===== */
.btn {
  padding: 12px 18px; border-radius: var(--r-s);
  font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; border: none; transition: all .15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
}
.btn:active { transform: scale(.97); }
.btn-p {
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  color: #fff; flex: 1;
  box-shadow: 0 4px 12px rgba(79,70,229,.3);
}
.btn-s { background: var(--bg); color: var(--text-s); border: 1.5px solid var(--border); min-width: 80px; }
.btn-d { background: #FEF2F2; color: var(--danger); border: 1.5px solid #FECACA; }

/* ===== EVENT DETAIL ===== */
.ed-hdr {
  padding: 22px 18px 18px; color: #fff;
}
.ed-cat   { font-size: 13px; opacity: .75; margin-bottom: 5px; }
.ed-title { font-size: 21px; font-weight: 800; margin-bottom: 6px; }
.ed-sub   { font-size: 13px; opacity: .8; }
.ed-body  { padding: 16px 18px; }
.ed-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.ed-row:last-child { border-bottom: none; }
.ed-icon  { font-size: 19px; width: 26px; flex-shrink: 0; }
.ed-val   { font-size: 15px; color: var(--text); flex: 1; }
.ed-acts  {
  display: flex; gap: 9px; padding: 11px 18px;
  padding-bottom: max(11px, env(safe-area-inset-bottom, 11px));
  border-top: 1px solid var(--border);
}
.wa-btn {
  background: #25D366; color: #fff; border: none;
  border-radius: var(--r-s); padding: 12px 16px;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 7px; flex: 1;
  transition: opacity .15s;
}
.wa-btn:active { opacity: .85; }
.gcal-btn {
  background: #fff; color: #3C4043; border: 1.5px solid var(--border);
  border-radius: var(--r-s); padding: 12px 14px;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all .15s; white-space: nowrap;
}
.gcal-btn:active { background: #F8F9FA; }

/* ===== TOAST ===== */
#toast {
  position: fixed;
  bottom: calc(var(--bnav) + 12px);
  left: 14px; right: 14px;
  background: #1E293B; color: #fff;
  padding: 11px 16px; border-radius: var(--r-s);
  font-size: 14px; font-weight: 600;
  z-index: 400;
  transform: translateY(16px); opacity: 0;
  transition: all .25s; text-align: center;
  pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }

/* ===== LOADING ===== */
.spinner {
  width: 26px; height: 26px; border: 2.5px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .6s linear infinite; margin: 40px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== ANIMATIONS ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeUp .22s ease-out; }

/* ===== SAFE AREA ===== */
#app-screen { padding-top: env(safe-area-inset-top, 0); }
#app-header { height: calc(var(--hdr) + env(safe-area-inset-top, 0)); padding-top: calc(8px + env(safe-area-inset-top, 0)); }

/* ===== RESPONSIVE ===== */
/* ===== MOBILE FIRST — small screens ===== */
@media (max-height: 680px) {
  .auth-header { margin-bottom: 20px; }
  .auth-logo   { width: 60px; height: 60px; font-size: 30px; margin-bottom: 10px; }
  .auth-title  { font-size: 22px; }
  .auth-prompt { margin-bottom: 18px; font-size: 15px; }
  .auth-hint   { display: none; }
}

/* ===== DESKTOP — center like a phone ===== */
@media (min-width: 500px) {
  body { background: #CBD5E1; }
  .screen {
    max-width: 430px;
    left: 50%; right: auto;
    transform: translateX(-50%);
    box-shadow: 0 0 60px rgba(0,0,0,.25);
  }
  #toast { max-width: 430px; left: 50%; transform: translateX(-50%) translateY(16px); }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #bottom-nav { max-width: 430px; left: 50%; transform: translateX(-50%); }
  .mv-cell { min-height: 80px; }
  .msheet  { max-width: 430px; margin: 0 auto; border-radius: var(--r); }
  .moverlay { align-items: center; }
}

/* ===== Minimum tap target size ===== */
.icon-btn, .dnav-btn, .nbtn {
  min-width: 44px; min-height: 44px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===== SECTION PAGES ===== */
.sec-page { padding: 14px; }
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sec-title { font-size: 20px; font-weight: 800; color: var(--text); }
.sec-subtitle { font-size: 13px; color: var(--text-m); margin-top: 2px; }

/* ===== SHOPPING ===== */
.shop-toolbar {
  display: flex; gap: 9px; margin-bottom: 14px;
}
.shop-search {
  flex: 1; padding: 10px 13px;
  border: 1.5px solid var(--border); border-radius: var(--r-s);
  font-family: 'Heebo', sans-serif; font-size: 14px; color: var(--text);
  background: var(--card); outline: none; direction: rtl;
}
.shop-search:focus { border-color: var(--primary); }
.btn-add-item {
  padding: 10px 16px; border-radius: var(--r-s);
  background: linear-gradient(135deg, #4F46E5, #7C3AED);
  color: #fff; border: none; font-family: 'Heebo', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.shop-cat-section { margin-bottom: 16px; }
.shop-cat-hdr {
  font-size: 12px; font-weight: 800; color: var(--text-m);
  text-transform: uppercase; letter-spacing: .4px;
  padding: 0 4px 7px;
  display: flex; align-items: center; gap: 8px;
}
.shop-cat-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.shop-item {
  background: var(--card); border-radius: var(--r-s);
  padding: 12px 13px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: var(--sh); transition: opacity .2s;
}
.shop-item.checked { opacity: .45; }
.shop-cb {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .15s;
  font-size: 13px;
}
.shop-cb.on { background: var(--success); border-color: var(--success); color: #fff; }
.shop-item-name {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
  transition: all .2s;
}
.shop-item.checked .shop-item-name { text-decoration: line-through; color: var(--text-m); }
.shop-item-qty { font-size: 12px; color: var(--text-m); margin-left: 6px; }
.shop-del {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: #FEF2F2; color: var(--danger);
  cursor: pointer; font-size: 15px; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.shop-footer {
  display: flex; gap: 9px; padding: 14px 0 4px;
  border-top: 1px solid var(--border); margin-top: 4px;
}
.shop-stats { font-size: 13px; color: var(--text-m); padding-top: 10px; flex: 1; }

/* ===== TASKS ===== */
.task-add-bar {
  display: flex; gap: 9px; margin-bottom: 16px;
}
.task-section-lbl {
  font-size: 12px; font-weight: 800; color: var(--text-m);
  text-transform: uppercase; letter-spacing: .4px;
  padding: 0 4px 8px;
  display: flex; align-items: center; gap: 8px;
}
.task-section-lbl::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.task-card {
  background: var(--card); border-radius: var(--r-s);
  padding: 12px 13px; margin-bottom: 7px;
  display: flex; align-items: center; gap: 11px;
  box-shadow: var(--sh); transition: opacity .2s;
  border-right: 4px solid var(--border);
}
.task-card.done-card { opacity: .5; }
.task-cb {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .2s; font-size: 13px;
}
.task-cb.on { color: #fff; border-color: transparent; }
.task-info { flex: 1; min-width: 0; }
.task-title {
  font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-card.done-card .task-title { text-decoration: line-through; color: var(--text-m); }
.task-meta { font-size: 11px; color: var(--text-m); margin-top: 2px; display: flex; align-items: center; gap: 6px; }
.task-who {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.task-del {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: #FEF2F2; color: var(--danger);
  cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* ===== SCORE ===== */
.score-toggle {
  display: flex; gap: 6px; margin-bottom: 16px;
  background: var(--card); padding: 5px; border-radius: var(--r-s);
  box-shadow: var(--sh);
}
.score-toggle-btn {
  flex: 1; padding: 8px 4px; border: none; border-radius: var(--r-xs);
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-m); cursor: pointer;
  transition: all .15s;
}
.score-toggle-btn.active { background: var(--primary); color: #fff; }
.score-vs {
  background: var(--card); border-radius: var(--r);
  padding: 20px; margin-bottom: 14px; box-shadow: var(--sh-m);
  text-align: center;
}
.score-players {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 12px; margin-bottom: 16px;
}
.score-player { text-align: center; }
.score-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff; margin: 0 auto 6px;
  position: relative;
}
.score-crown {
  position: absolute; top: -14px; left: 50%;
  transform: translateX(-50%); font-size: 20px;
}
.score-pname { font-size: 15px; font-weight: 800; color: var(--text); }
.score-num   { font-size: 28px; font-weight: 800; }
.score-sep   { font-size: 22px; font-weight: 300; color: var(--text-m); }
.score-bar-wrap {
  background: var(--bg); border-radius: 20px; height: 10px;
  overflow: hidden; margin-bottom: 8px;
  display: flex;
}
.score-bar-left  { height: 100%; border-radius: 20px 0 0 20px; transition: width .4s ease; }
.score-bar-right { height: 100%; border-radius: 0 20px 20px 0; transition: width .4s ease; }
.score-bar-lbl   { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-m); }
.score-history {
  background: var(--card); border-radius: var(--r);
  padding: 14px 16px; box-shadow: var(--sh);
}
.score-hist-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
.score-hist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.score-hist-item:last-child { border-bottom: none; }
.score-hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.score-hist-text { flex: 1; font-size: 13px; color: var(--text); }
.score-hist-date { font-size: 11px; color: var(--text-m); }
</style>
</head>

// ============================================================
// PATTERN LOCK
// ============================================================
class PatternLock {
  constructor(canvas) {
    this.c   = canvas;
    this.ctx = canvas.getContext('2d');
    this.dots = [];
    this.pat  = [];
    this.actv = new Set();
    this.drawing = false;
    this.cur  = null;
    this._buildDots();
    this._draw();
    this._bind();
  }
  _buildDots() {
    const sz = this.c.width, sp = sz / 3, off = sp / 2;
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        this.dots.push({ x: off + c*sp, y: off + r*sp, i: r*3+c });
  }
  _draw() {
    const { ctx, c } = this;
    ctx.clearRect(0, 0, c.width, c.height);
    // Lines
    if (this.pat.length > 1) {
      ctx.beginPath();
      ctx.moveTo(this.dots[this.pat[0]].x, this.dots[this.pat[0]].y);
      for (let i = 1; i < this.pat.length; i++)
        ctx.lineTo(this.dots[this.pat[i]].x, this.dots[this.pat[i]].y);
      if (this.drawing && this.cur)
        ctx.lineTo(this.cur.x, this.cur.y);
      ctx.strokeStyle = 'rgba(129,140,248,.75)';
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.stroke();
    } else if (this.drawing && this.cur && this.pat.length === 1) {
      ctx.beginPath();
      ctx.moveTo(this.dots[this.pat[0]].x, this.dots[this.pat[0]].y);
      ctx.lineTo(this.cur.x, this.cur.y);
      ctx.strokeStyle = 'rgba(129,140,248,.75)';
      ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.stroke();
    }
    // Dots
    this.dots.forEach(d => {
      const on = this.actv.has(d.i);
      if (on) {
        ctx.beginPath(); ctx.arc(d.x, d.y, 22, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(129,140,248,.18)'; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(d.x, d.y, on ? 10 : 7, 0, Math.PI*2);
      ctx.fillStyle = on ? '#818CF8' : 'rgba(255,255,255,.45)'; ctx.fill();
      if (!on) {
        ctx.beginPath(); ctx.arc(d.x, d.y, 7, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1.5; ctx.stroke();
      }
    });
  }
  _pos(e) {
    const r = this.c.getBoundingClientRect();
    const sx = this.c.width / r.width, sy = this.c.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left)*sx, y: (src.clientY - r.top)*sy };
  }
  _hit(p) { return this.dots.find(d => Math.hypot(d.x-p.x, d.y-p.y) < 26); }
  _start(e) {
    e.preventDefault();
    const p = this._pos(e), d = this._hit(p);
    if (!d) return;
    this.drawing = true; this.pat = [d.i]; this.actv = new Set([d.i]); this.cur = p; this._draw();
  }
  _move(e) {
    if (!this.drawing) return; e.preventDefault();
    this.cur = this._pos(e);
    const d = this._hit(this.cur);
    if (d && !this.actv.has(d.i)) { this.pat.push(d.i); this.actv.add(d.i); }
    this._draw();
  }
  _end(e) {
    if (!this.drawing) return; e.preventDefault();
    this.drawing = false; this.cur = null;
    if (this.pat.length < 3) {
      this.reset(); setMsg('נא לחבר לפחות 3 נקודות', 'error'); return;
    }
    const match = matchPat(this.pat);
    this._draw();
    if (match) {
      setMsg('מחובר! ✓', 'success');
      setTimeout(() => doLogin(match), 650);
    } else {
      setMsg('דפוס שגוי — נסה שוב', 'error');
      setTimeout(() => { this.reset(); setMsg(''); }, 900);
    }
  }
  reset() { this.pat=[]; this.actv=new Set(); this.drawing=false; this.cur=null; this._draw(); }
  _bind() {
    const c = this.c;
    c.addEventListener('touchstart', this._start.bind(this), {passive:false});
    c.addEventListener('touchmove',  this._move.bind(this),  {passive:false});
    c.addEventListener('touchend',   this._end.bind(this),   {passive:false});
    c.addEventListener('mousedown',  this._start.bind(this));
    c.addEventListener('mousemove',  this._move.bind(this));
    c.addEventListener('mouseup',    this._end.bind(this));
  }
}

// ============================================================
// DATE UTILS
// ============================================================
function dStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function today() { return dStr(new Date()); }
function fmtDate(s, fmt='full') {
  if (!s) return '';
  const d = new Date(s + 'T12:00:00');
  const day = d.getDate(), mo = MONTHS[d.getMonth()], yr = d.getFullYear(), dn = DAYS_F[d.getDay()];
  if (fmt === 'full')       return `${dn}, ${day} ב${mo} ${yr}`;
  if (fmt === 'short')      return `${day} ב${mo}`;
  if (fmt === 'month-year') return `${mo} ${yr}`;
  return s;
}
function fmtTime(t) { return t ? t.substring(0,5) : ''; }
function daysUntil(s) {
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((new Date(s+'T12:00:00') - now) / 86400000);
}
function evColor(ev) {
  const uid = ev.assigned_to || ev.created_by;
  return (uid && USERS[uid]) ? USERS[uid].color : '#4F46E5';
}
function weekStart(d) {
  const dt = new Date(d); dt.setDate(dt.getDate() - dt.getDay()); dt.setHours(0,0,0,0); return dt;
}
function parseTime(t) {
  if (!t) return null;
  const p = t.split(':');
  return { h: parseInt(p[0]), m: parseInt(p[1]||0) };
}

// ============================================================
// RECURRENCE EXPANSION
// ============================================================
function expandEvents(events, start, end) {
  const s = new Date(start+'T00:00:00'), e = new Date(end+'T23:59:59');
  const result = [];
  for (const ev of events) {
    const base = new Date(ev.date+'T12:00:00');
    if (!ev.recurrence || ev.recurrence === 'none') {
      if (base >= s && base <= e) result.push(ev);
      continue;
    }
    // original if in range
    if (base >= s && base <= e) result.push(ev);
    // generate future instances
    const cur = new Date(base); let iter = 0;
    while (iter++ < 600) {
      switch(ev.recurrence) {
        case 'daily':   cur.setDate(cur.getDate()+1); break;
        case 'weekly':  cur.setDate(cur.getDate()+7); break;
        case 'monthly': cur.setMonth(cur.getMonth()+1); break;
        case 'yearly':  cur.setFullYear(cur.getFullYear()+1); break;
      }
      if (cur > e) break;
      if (cur >= s) {
        result.push({...ev, date: dStr(cur), id: ev.id+'__'+dStr(cur), _orig: ev.id});
      }
    }
  }
  return result;
}

// ============================================================
// FILTERING
// ============================================================
function filtered(evs) {
  return evs.filter(ev => {
    if (S.filters.users !== 'all') {
      if (ev.assigned_to !== S.filters.users && ev.created_by !== S.filters.users) return false;
    }
    if (ev.category && !S.filters.cats.has(ev.category)) return false;
    return true;
  });
}
function evsByDate(dateStr) {
  return filtered(expandEvents(S.events, dateStr, dateStr));
}
function evsInRange(s, e) {
  return filtered(expandEvents(S.events, s, e)).sort((a,b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    if (a.start_time && b.start_time) return a.start_time.localeCompare(b.start_time);
    return 0;
  });
}

function updateTitle() {
  const d = S.date;
  let t = '';
  switch(S.view) {
    case 'month': t = fmtDate(dStr(d), 'month-year'); break;
    case 'week': {
      const ws = weekStart(d), we = new Date(ws); we.setDate(we.getDate()+6);
      t = ws.getMonth()===we.getMonth()
        ? `${ws.getDate()}–${we.getDate()} ב${MONTHS[ws.getMonth()]}`
        : `${ws.getDate()} ${MONTHS[ws.getMonth()]} – ${we.getDate()} ${MONTHS[we.getMonth()]}`;
      break;
    }
    case 'day':  t = fmtDate(dStr(d)); break;

  }

  const d = S.date;
  switch(S.view) {
    case 'month': S.date = new Date(d.getFullYear(), d.getMonth()+dir, 1); break;
    case 'week':  S.date = new Date(d.getTime() + dir*7*86400000); break;
    case 'day':   S.date = new Date(d.getTime() + dir*86400000); break;
    case 'list':  S.date = new Date(d.getFullYear(), d.getMonth()+dir, 1); break;
  }
  renderCal();
}

// ——— Month ———
function renderMonth(c) {
  const d = S.date, Y = d.getFullYear(), M = d.getMonth();
  const first = new Date(Y, M, 1).getDay();
  const daysM = new Date(Y, M+1, 0).getDate();
  const cells  = Math.ceil((first + daysM) / 7) * 7;
  const rangeS = new Date(Y, M, 1 - first);
  const rangeE = new Date(rangeS); rangeE.setDate(rangeS.getDate() + cells - 1);
  const evs = evsInRange(dStr(rangeS), dStr(rangeE));
  const byDate = {};
  evs.forEach(ev => { (byDate[ev.date] = byDate[ev.date]||[]).push(ev); });

  const heads = DAYS_S.map(h => `<div class="mv-head">${h}</div>`).join('');
  let cellsHTML = '', cur = new Date(rangeS);
  for (let i = 0; i < cells; i++) {
    const ds = dStr(cur), inM = cur.getMonth()===M, isT = ds===today();
    const dayEvs = byDate[ds]||[];
    const chips = dayEvs.slice(0,3).map(ev =>
      `<div class="mv-chip" style="background:${evColor(ev)}" title="${ev.title}">${ev.title}</div>`
    ).join('');
    const more = dayEvs.length > 3 ? `<div class="mv-more">+${dayEvs.length-3}</div>` : '';
    cellsHTML += `<div class="mv-cell ${inM?'':'other'} ${isT?'today':''}" data-date="${ds}" onclick="gotoDay('${ds}')">
      <div class="mv-dn">${cur.getDate()}</div>
      <div class="mv-evts">${chips}${more}</div>
    </div>`;
    cur.setDate(cur.getDate()+1);
  }
  c.innerHTML = `<div class="mv anim"><div class="mv-heads">${heads}</div><div class="mv-grid">${cellsHTML}</div></div>`;
}

function gotoDay(ds) {
  S.view = 'day'; S.date = new Date(ds+'T12:00:00');
  setViewTab('day'); renderCal();
}

// ——— Week ———
function renderWeek(c) {
  const ws = weekStart(S.date);
  const days = Array.from({length:7}, (_,i) => { const d=new Date(ws); d.setDate(ws.getDate()+i); return d; });
  const evs  = evsInRange(dStr(days[0]), dStr(days[6]));
  const HOURS = Array.from({length:17}, (_,i) => i+7); // 7–23

  const hdrCells = `<div class="wv-hcell"></div>` + days.map(d => {
    const isT = dStr(d)===today();
    return `<div class="wv-hcell"><div class="wv-dname">${DAYS_S[d.getDay()]}</div><div class="wv-dnum ${isT?'tod':''}">${d.getDate()}</div></div>`;
  }).join('');

  const tCol = HOURS.map(h => `<div class="wv-tlbl">${String(h).padStart(2,'0')}:00</div>`).join('');

  const dayCols = days.map(d => {
    const ds = dStr(d);
    const dayEvs = evs.filter(e => e.date===ds && e.start_time);
    const slots  = HOURS.map(() => `<div class="wv-slot"></div>`).join('');
    const evHTML = dayEvs.map(ev => {
      const st = parseTime(ev.start_time), en = ev.end_time ? parseTime(ev.end_time) : {h:st.h+1,m:st.m};
      const top = (st.h - 7)*44 + st.m/60*44;
      const hgt = Math.max(22, (en.h - st.h)*44 + (en.m - st.m)/60*44);
      return `<div class="wv-evt" style="top:${top}px;height:${hgt}px;background:${evColor(ev)}" onclick="showDetail('${ev.id}')">${ev.title}</div>`;
    }).join('');
    return `<div class="wv-dcol" style="position:relative">${slots}${evHTML}</div>`;
  }).join('');

  c.innerHTML = `<div class="wv anim"><div class="wv-wrap"><div class="wv-hdr">${hdrCells}</div><div class="wv-body"><div class="wv-tcol">${tCol}</div>${dayCols}</div></div></div>`;
}

// ——— Day ———
function renderDay(c) {

  const HOURS = Array.from({length:17}, (_,i) => i+7);

  const slots = HOURS.map(() => `<div class="wv-slot"></div>`).join('');
  const evHTML = withTime.map(ev => {
    const st = parseTime(ev.start_time), en = ev.end_time ? parseTime(ev.end_time) : {h:st.h+1,m:st.m};
    const top = (st.h-7)*44 + st.m/60*44;
    const hgt = Math.max(32, (en.h-st.h)*44 + (en.m-st.m)/60*44);
    return `<div class="dv-evt" style="top:${top}px;height:${hgt}px;background:${evColor(ev)}" onclick="showDetail('${ev.id}')">
      <div style="font-weight:800;font-size:12px">${ev.title}</div>
      <div style="font-size:10px;opacity:.85">${fmtTime(ev.start_time)}${ev.end_time?' – '+fmtTime(ev.end_time):''}</div>
    </div>`;
  }).join('');

  c.innerHTML = `<div class="dv anim">${allDayHTML}<div class="dv-wrap"><div class="wv-tcol">${tCol}</div><div class="dv-dcol" style="position:relative">${slots}${evHTML}</div></div></div>`;
}

function renderList(c) {
  const sd = new Date(S.date.getFullYear(), S.date.getMonth(), 1);
  const ed = new Date(S.date.getFullYear(), S.date.getMonth()+3, 0);
  const evs = evsInRange(dStr(sd), dStr(ed));
  if (!evs.length) {
    c.innerHTML = `<div class="lv anim"><div style="text-align:center;padding:60px 20px;color:var(--text-m)"><div style="font-size:48px">📭</div><div style="margin-top:12px;font-size:15px">אין אירועים בתקופה זו</div></div></div>`;
    return;
  }
  const grouped = {};
  evs.forEach(ev => (grouped[ev.date]=grouped[ev.date]||[]).push(ev));
  const td = today(), tm = dStr(new Date(Date.now()+86400000));
  let html = '';
  for (const [ds, dayEvs] of Object.entries(grouped)) {
    let lbl = fmtDate(ds);
    if (ds===td) lbl = `היום — ${lbl}`;
    else if (ds===tm) lbl = `מחר — ${lbl}`;
    const cards = dayEvs.map(ev => {
      const col = evColor(ev), cat = CATS[ev.category];
      const time = ev.start_time ? `${fmtTime(ev.start_time)}${ev.end_time?' – '+fmtTime(ev.end_time):''}` : 'כל היום';
      return `<div class="lv-card" style="border-right-color:${col}" onclick="showDetail('${ev.id}')">
        <div class="lv-time">${time}</div>
        <div class="lv-info">
          <div class="lv-title">${ev.title}</div>
          <div class="lv-meta">${cat?cat.icon+' '+cat.name:''}${ev.location?'<span>📍 '+ev.location+'</span>':''}</div>
        </div>
        <div class="lv-dot" style="background:${col}"></div>
      </div>`;
    }).join('');
    html += `<div class="lv-dg"><div class="lv-dhdr">${lbl}</div>${cards}</div>`;
  }
  c.innerHTML = `<div class="lv anim">${html}</div>`;
}

function renderDash() {
  const wrap = document.getElementById('dashboard-wrap');
  const now = new Date(); now.setHours(0,0,0,0);
  const in7 = new Date(now); in7.setDate(in7.getDate()+7);
  const upcoming = evsInRange(dStr(now), dStr(in7));
  const birthdays = getBirthdays(S.events, 90);

  const upRows = upcoming.length
    ? upcoming.slice(0,6).map(ev => {
        const du = daysUntil(ev.date);
        const when = du===0?'היום':du===1?'מחר':`עוד ${du} ימ׳`;
        const time = ev.start_time ? fmtTime(ev.start_time)+' · ' : '';
        const cat  = CATS[ev.category];
        return `<div class="up-item" onclick="showDetail('${ev.id}')">
          <div class="up-bar" style="background:${evColor(ev)}"></div>
          <div class="up-info">
            <div class="up-title">${ev.title}</div>
            <div class="up-meta">${time}${cat?cat.icon+' '+cat.name:''}</div>
          </div>
          <div class="up-when">${when}</div>
        </div>`;
      }).join('')
    : `<div class="empty-dash">אין אירועים ב-7 הימים הקרובים</div>`;

  const bdRows = birthdays.slice(0,4).map(b => {
    const lbl = b.du===0?'היום! 🎉':b.du===1?'מחר! 🎂':`עוד ${b.du} יום`;
    return `<div class="bday-item">
      <div class="bday-av">🎂</div>
      <div class="bday-info">
        <div class="bday-name">${b.title}</div>
        <div class="bday-sub">${fmtDate(b.nextDate,'short')}</div>
      </div>
      <div class="bday-badge">${lbl}</div>
    </div>`;
  }).join('');

  wrap.innerHTML = `<div class="dash anim">
    <div class="dash-card">
      <div class="dash-hd">⏰ הקרוב ב-7 ימים</div>
      ${upRows}
    </div>
    ${birthdays.length ? `<div class="dash-card">
      <div class="dash-hd">🎂 ימי הולדת קרובים</div>
      ${bdRows}
    </div>` : ''}
  </div>`;
}

function getBirthdays(evs, days) {
  const now = new Date(); now.setHours(0,0,0,0);
  return evs
    .filter(ev => ev.category === 'birthday' && ev.date)
    .map(ev => {
      const bd = new Date(ev.date+'T12:00:00');
      let next = new Date(now.getFullYear(), bd.getMonth(), bd.getDate());
      if (next < now) next = new Date(now.getFullYear()+1, bd.getMonth(), bd.getDate());
      const du = Math.round((next-now)/86400000);
      return {...ev, nextDate: dStr(next), du};
    })
    .filter(b => b.du <= days)
    .sort((a,b) => a.du-b.du);
}

function shareWA(eid) {
  const ev = S.events.find(e=>e.id===eid) || S.events.find(e=>eid.startsWith(e.id+'__'));
  if (!ev) return;
  // שלח תמיד לצד השני
  const assignedUser = USERS[ev.assigned_to] || USERS[ev.created_by];
  const otherUser    = assignedUser?.id === 'maor' ? USERS.ravit : USERS.maor;
  const targetPhone  = otherUser.phone;

  // קישור ליומן (כתובת האפליקציה הנוכחית)
  const calLink = window.location.origin + window.location.pathname;

  // פרטי האירוע
  const date = `📆 תאריך: ${fmtDate(ev.date)}`;
  const time = ev.start_time ? `⏰ שעה: ${fmtTime(ev.start_time)}${ev.end_time?' – '+fmtTime(ev.end_time):''}` : '';
  const loc  = ev.location   ? `📍 מיקום: ${ev.location}` : '';
  const who  = assignedUser  ? `👤 עבור: ${assignedUser.name}` : '';
  const note = ev.notes      ? `📝 הערות: ${ev.notes}` : '';

  const lines = [
    `היי, שים לב שעודכן אירוע ביומן המשותף 📅`,
    ``,
    `*${ev.title}*`,
    date,
    time, loc, who, note
  ].filter(Boolean).join('\n');

  const footer = `\n\n🔗 לצפייה ביומן:\n${calLink}`;

  window.open(`https://wa.me/${targetPhone}?text=${encodeURIComponent(lines + footer)}`, '_blank');
}

function openMaps(loc) {
  window.open(`https://maps.google.com/?q=${encodeURIComponent(loc)}`, '_blank');
}

function addToGCal(eid) {
  const ev = S.events.find(e=>e.id===eid) || S.events.find(e=>eid.startsWith(e.id+'__'));
  if (!ev) return;

  // Build date strings in Google Calendar format: YYYYMMDDTHHMMSS
  const dateBase = ev.date.replace(/-/g, '');

  let dates;
  if (ev.start_time) {
    const start = ev.start_time.replace(/:/g,'').substring(0,4) + '00';
    const end   = ev.end_time
      ? ev.end_time.replace(/:/g,'').substring(0,4) + '00'
      : String(parseInt(ev.start_time.substring(0,2)) + 1).padStart(2,'0') + ev.start_time.substring(3,5) + '00';
    dates = `${dateBase}T${start}/${dateBase}T${end}`;
  } else {
    // All-day event — format: YYYYMMDD/YYYYMMDD (next day for Google)
    const next = new Date(ev.date + 'T12:00:00');
    next.setDate(next.getDate() + 1);
    dates = `${dateBase}/${dStr(next).replace(/-/g,'')}`;
  }

  // Recurrence rule
  const rruleMap = {
    daily: 'RRULE:FREQ=DAILY',
    weekly: 'RRULE:FREQ=WEEKLY',
    monthly: 'RRULE:FREQ=MONTHLY',
    yearly: 'RRULE:FREQ=YEARLY'
  };

  const params = new URLSearchParams({
    action:   'TEMPLATE',
    text:     ev.title,
    dates:    dates,
    details:  [ev.notes || '', ev.location ? '📍 ' + ev.location : ''].filter(Boolean).join('\n'),
    location: ev.location || '',
    ...(ev.recurrence && ev.recurrence !== 'none' ? { recur: rruleMap[ev.recurrence] } : {})
  });

  window.open(`https://calendar.google.com/calendar/render?${params.toString()}`, '_blank');
}

async function doSave() {
  const title = document.getElementById('f-title').value.trim();
  const date  = document.getElementById('f-date').value;
  if (!title) { showToast('נא להזין כותרת'); return; }
  if (!date)  { showToast('נא לבחור תאריך'); return; }
  const cat   = document.getElementById('f-cat').value;
  let recur   = document.getElementById('f-recur').value;
  if (cat === 'birthday') recur = 'yearly';
  const data  = {
    title, date,
    start_time: document.getElementById('f-start').value || null,
    end_time:   document.getElementById('f-end').value   || null,
    category: cat, recurrence: recur,
    location: document.getElementById('f-loc').value.trim()   || null,
    notes:    document.getElementById('f-notes').value.trim() || null,
    assigned_to: S.assigned, created_by: S.user.id,
    color: USERS[S.assigned]?.color || S.user.color
  };
  const btn = document.getElementById('event-save');
  btn.disabled = true; btn.textContent = 'שומר...';
  let res;
  if (S.editing) {
    res = await dbUpdate(S.editing.id, data);
    if (res) {
      const i = S.events.findIndex(e=>e.id===S.editing.id);
      if (i >= 0) S.events[i] = {...S.events[i], ...data};
      showToast('האירוע עודכן ✓');
    }
  } else {
    res = await dbCreate(data);
    if (res) { S.events.push(res); showToast('האירוע נוסף ✓'); }
  }
  btn.disabled = false; btn.textContent = '💾 שמור';
  if (res) { closeModal('modal-event'); renderCal(); }
}

async function confirmDel() {
  if (!S.editing || !confirm('האם למחוק את האירוע?')) return;
  const ok = await dbDelete(S.editing.id);
  if (ok) {
    S.events = S.events.filter(e => e.id !== S.editing.id);
    closeModal('modal-event'); closeModal('modal-detail');
    showToast('האירוע נמחק'); renderCal();
  }
}

  if (sec === 'shopping') renderShopping();

  if (sec === 'score')    renderScore();
  if (sec === 'calendar') renderCal();
}

  await sb.from('shopping_items').delete().eq('id',id);
}
async function shopReset() {
  const checked = _shopItems.filter(x=>x.checked);
  for (const item of checked) await shopDelete(item.id);
  _shopItems = _shopItems.filter(x=>!x.checked);
  renderShopping();
  showToast(`נמחקו ${checked.length} מוצרים מסומנים`);
}

// ============================================================
// SHOPPING — RENDER
// ============================================================
async function renderShopping() {
  const c = document.getElementById('sec-shopping');
  c.innerHTML = `<div class="sec-page"><div style="text-align:center;padding:40px 0"><div class="spinner"></div></div></div>`;
  _shopItems = await shopFetch();
  _renderShoppingUI();
}

function _renderShoppingUI() {
  const c = document.getElementById('sec-shopping');
  const items = _shopItems.filter(i => !_shopSearch || i.name.includes(_shopSearch));
  const total = _shopItems.length, done = _shopItems.filter(x=>x.checked).length;

  // Group by category
  const grouped = {};
  items.forEach(it => { (grouped[it.category||'other'] = grouped[it.category||'other']||[]).push(it); });

  let sectionsHTML = '';
  for (const [catKey, catItems] of Object.entries(grouped)) {
    const cat = SHOP_CATS[catKey] || SHOP_CATS.other;
    const rows = catItems.map(it => `
      <div class="shop-item ${it.checked?'checked':''}" id="si-${it.id}">
        <div class="shop-cb ${it.checked?'on':''}" onclick="toggleShopItem('${it.id}',${!it.checked})">${it.checked?'✓':''}</div>
        <span class="shop-item-name">${it.name}</span>
        ${it.quantity ? `<span class="shop-item-qty">${it.quantity}</span>` : ''}
        <button class="shop-del" onclick="deleteShopItem('${it.id}')">✕</button>
      </div>`).join('');
    sectionsHTML += `<div class="shop-cat-section">
      <div class="shop-cat-hdr">${cat.icon} ${cat.name}</div>
      ${rows}
    </div>`;
  }

  if (!items.length) sectionsHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-m)">
    <div style="font-size:48px">🛒</div>
    <div style="margin-top:12px;font-size:15px">${_shopSearch ? 'לא נמצאו מוצרים' : 'הרשימה ריקה — הוסף מוצרים!'}</div>
  </div>`;

  c.innerHTML = `<div class="sec-page">
    <div class="shop-toolbar">
      <input type="search" class="shop-search" id="shop-search-inp" placeholder="🔍 חיפוש מוצר..." value="${_shopSearch}" oninput="shopSearch(this.value)">
      <button class="btn-add-item" onclick="openModal('modal-shop-item')">➕ הוסף</button>
    </div>
    ${sectionsHTML}
    ${total > 0 ? `<div class="shop-footer">
      <div class="shop-stats">${done} מתוך ${total} מוצרים ✓</div>
      ${done > 0 ? `<button class="btn btn-d" style="font-size:13px;padding:9px 14px" onclick="shopReset()">🗑️ נקה מסומנים (${done})</button>` : ''}
    </div>` : ''}
  </div>`;
}

function shopSearch(val) { _shopSearch = val; _renderShoppingUI(); }

async function toggleShopItem(id, checked) {
  const item = _shopItems.find(x=>x.id==id); if (!item) return;
  item.checked = checked;
  await shopToggle(id, checked);
  _renderShoppingUI();
}

async function deleteShopItem(id) {
  await shopDelete(id);
  _shopItems = _shopItems.filter(x=>x.id!=id);
  _renderShoppingUI();
}

async function saveShopItem() {
  const name = document.getElementById('si-name').value.trim();
  if (!name) { showToast('נא להזין שם מוצר'); return; }
  const item = {
    name,
    quantity: document.getElementById('si-qty').value.trim() || null,
    category: document.getElementById('si-cat').value,
    added_by: S.user.id, checked: false
  };
  const saved = await shopCreate(item);
  if (saved) {
    _shopItems.push(saved);
    closeModal('modal-shop-item');
    document.getElementById('si-name').value = '';
    document.getElementById('si-qty').value  = '';
    _renderShoppingUI();
    showToast(`${name} נוסף לרשימה ✓`);
  }
}

// ============================================================
// TASKS — DATA
// ============================================================
let _tasks = [];

async function tasksFetch() {
  if (S.demo) return JSON.parse(localStorage.getItem('fc_tasks')||'[]');
  const { data } = await sb.from('tasks').select('*').order('created_at', {ascending:false});
  return data || [];
}
async function tasksCreate(task) {
  if (S.demo) {
    const tasks = JSON.parse(localStorage.getItem('fc_tasks')||'[]');
    const n = {...task, id:'tk_'+Date.now(), done:false};
    tasks.unshift(n); localStorage.setItem('fc_tasks', JSON.stringify(tasks)); return n;
  }
  const { data } = await sb.from('tasks').insert([task]).select().single();
  return data;
}
async function tasksToggle(id, done) {
  const now = done ? new Date().toISOString() : null;
  const patch = { done, done_by: done ? S.user.id : null, done_at: now };
  if (S.demo) {
    const tasks = JSON.parse(localStorage.getItem('fc_tasks')||'[]');
    const i = tasks.findIndex(x=>x.id==id); if(i>=0) Object.assign(tasks[i], patch);
    localStorage.setItem('fc_tasks', JSON.stringify(tasks)); return;
  }
  await sb.from('tasks').update(patch).eq('id',id);
}
async function tasksDelete(id) {
  if (S.demo) {
    const tasks = JSON.parse(localStorage.getItem('fc_tasks')||'[]').filter(x=>x.id!=id);
    localStorage.setItem('fc_tasks', JSON.stringify(tasks)); return;
  }
  await sb.from('tasks').delete().eq('id',id);
}

// ============================================================
// TASKS — RENDER
// ============================================================
async function renderTasks() {
  const c = document.getElementById('sec-tasks');
  c.innerHTML = `<div class="sec-page"><div style="text-align:center;padding:40px 0"><div class="spinner"></div></div></div>`;
  _tasks = await tasksFetch();
  _renderTasksUI();
}

function _renderTasksUI() {
  const c = document.getElementById('sec-tasks');
  const open   = _tasks.filter(t => !t.done);
  const closed = _tasks.filter(t =>  t.done);

  const taskCard = (t) => {
    const u = USERS[t.assigned_to] || USERS[t.created_by] || USERS.maor;
    const doneBy = t.done && USERS[t.done_by] ? USERS[t.done_by] : null;
    const meta = doneBy ? `בוצע ע"י ${doneBy.name}` : (u ? `מיועד ל-${u.name}` : '');
    return `<div class="task-card ${t.done?'done-card':''}" style="border-right-color:${u.color}">
      <div class="task-cb ${t.done?'on':''}" style="${t.done?'background:'+u.color:''}"
           onclick="toggleTask('${t.id}',${!t.done})">${t.done?'✓':''}</div>
      <div class="task-info">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">
          <div class="task-who" style="background:${u.color}">${u.initials}</div>
          ${meta}
        </div>
      </div>
      <button class="task-del" onclick="deleteTask('${t.id}')">✕</button>
    </div>`;
  };

  const openHTML = open.length
    ? open.map(taskCard).join('')
    : `<div style="text-align:center;padding:32px 20px;color:var(--text-m)"><div style="font-size:40px">🎉</div><div style="margin-top:8px;font-size:14px">אין משימות פתוחות!</div></div>`;

  const closedHTML = closed.length
    ? `<div style="margin-top:18px">
        <div class="task-section-lbl">הושלמו (${closed.length})</div>
        ${closed.slice(0,5).map(taskCard).join('')}
      </div>`
    : '';

  c.innerHTML = `<div class="sec-page">
    <div class="task-add-bar">
      <button class="btn btn-p" style="flex:1" onclick="openModal('modal-task')">➕ הוסף משימה</button>
    </div>
    <div class="task-section-lbl">פתוחות (${open.length})</div>
    ${openHTML}
    ${closedHTML}
  </div>`;
}

async function toggleTask(id, done) {
  const t = _tasks.find(x=>x.id==id); if(!t) return;
  t.done = done; t.done_by = done ? S.user.id : null; t.done_at = done ? new Date().toISOString() : null;
  await tasksToggle(id, done);
  _renderTasksUI();
  if (done) showToast('משימה הושלמה! 🎉');
}
async function deleteTask(id) {
  if (!confirm('למחוק את המשימה?')) return;
  await tasksDelete(id);
  _tasks = _tasks.filter(x=>x.id!=id);
  _renderTasksUI();
}
async function saveTask() {
  const title = document.getElementById('tk-title').value.trim();
  if (!title) { showToast('נא להזין תיאור משימה'); return; }
  const task = { title, assigned_to: _taskAssign, created_by: S.user.id, done: false };
  const saved = await tasksCreate(task);
  if (saved) {
    _tasks.unshift(saved);
    closeModal('modal-task');
    document.getElementById('tk-title').value = '';
    _renderTasksUI();
    showToast('משימה נוספה ✓');
  }
}
function updateTaskAssign() {
  document.getElementById('tao-maor').className  = 'assign-opt' + (_taskAssign==='maor'  ? ' sel-m' : '');
  document.getElementById('tao-ravit').className = 'assign-opt' + (_taskAssign==='ravit' ? ' sel-r' : '');
}

// ============================================================
// SCORE — RENDER
// ============================================================
let _scorePeriod = 'week'; // week | month | all

async function renderScore() {
  const c = document.getElementById('sec-score');
  c.innerHTML = `<div class="sec-page"><div style="text-align:center;padding:40px 0"><div class="spinner"></div></div></div>`;
  if (!_tasks.length) _tasks = await tasksFetch();
  _renderScoreUI();
}

function _renderScoreUI() {
  const c = document.getElementById('sec-score');
  const now = new Date();

  function inPeriod(t) {
    if (!t.done || !t.done_at) return false;
    const dt = new Date(t.done_at);
    if (_scorePeriod === 'all') return true;
    if (_scorePeriod === 'month') {
      return dt.getFullYear()===now.getFullYear() && dt.getMonth()===now.getMonth();
    }
    // week
    const weekAgo = new Date(now); weekAgo.setDate(now.getDate()-7);
    return dt >= weekAgo;
  }

  const periodTasks = _tasks.filter(inPeriod);
  const maorCount = periodTasks.filter(t => t.done_by==='maor').length;
  const ravitCount = periodTasks.filter(t => t.done_by==='ravit').length;
  const total = maorCount + ravitCount || 1;
  const maorPct = Math.round(maorCount/total*100);
  const ravitPct = 100 - maorPct;
  const maorLeads = maorCount >= ravitCount;

  const toggleBtns = [
    {k:'week', l:'שבוע'}, {k:'month', l:'חודש'}, {k:'all', l:'הכל'}
  ].map(x => `<button class="score-toggle-btn ${_scorePeriod===x.k?'active':''}" onclick="setScorePeriod('${x.k}')">${x.l}</button>`).join('');

  const recent = [..._tasks].filter(t=>t.done&&t.done_by).sort((a,b)=>new Date(b.done_at)-new Date(a.done_at)).slice(0,8);
  const histRows = recent.map(t => {
    const u = USERS[t.done_by];
    const dt = new Date(t.done_at);
    const lbl = `${dt.getDate()}/${dt.getMonth()+1}`;
    return `<div class="score-hist-item">
      <div class="score-hist-dot" style="background:${u?.color||'#ccc'}"></div>
      <div class="score-hist-text">${t.title}</div>
      <div class="score-hist-date">${u?.name||''} · ${lbl}</div>
    </div>`;
  }).join('') || `<div style="color:var(--text-m);font-size:13px;padding:12px 0">עדיין אין היסטוריה</div>`;

  c.innerHTML = `<div class="sec-page">
    <div class="score-toggle">${toggleBtns}</div>
    <div class="score-vs">
      <div class="score-players">
        <div class="score-player">
          <div class="score-avatar" style="background:var(--maor)">
            ${maorLeads && maorCount>0 ? '<div class="score-crown">👑</div>' : ''}
            מא
          </div>
          <div class="score-pname">מאור</div>
          <div class="score-num" style="color:var(--maor)">${maorCount}</div>
        </div>
        <div class="score-sep">VS</div>
        <div class="score-player">
          <div class="score-avatar" style="background:var(--ravit)">
            ${!maorLeads && ravitCount>0 ? '<div class="score-crown">👑</div>' : ''}
            רו
          </div>
          <div class="score-pname">רוית</div>
          <div class="score-num" style="color:var(--ravit)">${ravitCount}</div>
        </div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-left"  style="width:${maorPct}%;background:var(--maor)"></div>
        <div class="score-bar-right" style="width:${ravitPct}%;background:var(--ravit)"></div>
      </div>
      <div class="score-bar-lbl">
        <span style="color:var(--maor)">${maorPct}%</span>
        <span style="color:var(--ravit)">${ravitPct}%</span>
      </div>
    </div>
    <div class="score-history">
      <div class="score-hist-title">📋 משימות שהושלמו לאחרונה</div>
      ${histRows}
    </div>
  </div>`;
}

function setScorePeriod(p) { _scorePeriod = p; _renderScoreUI(); }

// ============================================================
// TOAST
// ============================================================
let _tt = null;
function showToast(msg, ms=2600) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), ms);
}

// ============================================================
// EVENTS BINDING
// ============================================================
function bindEvents() {
  // View tabs
  document.querySelectorAll('.vtab').forEach(t =>
    t.addEventListener('click', () => { setViewTab(t.dataset.view); renderCal(); }));

  // Bottom nav views
  document.querySelectorAll('#bottom-nav .nbtn[data-view]').forEach(b =>
    b.addEventListener('click', () => { setViewTab(b.dataset.view); renderCal(); }));

  // Date nav
  document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('btn-next').addEventListener('click', () => navigate(1));
  document.getElementById('date-title').addEventListener('click', () => { S.date = new Date(); renderCal(); showToast('חזרת להיום'); });

  // Section nav
  document.querySelectorAll('#bottom-nav .nbtn[data-sec]').forEach(b =>
    b.addEventListener('click', () => setSection(b.dataset.sec)));

  // FAB — context-aware
  document.getElementById('btn-add').addEventListener('click', () => {
    const action = document.getElementById('btn-add')._sectionAction;
    if (action) action(); else openAdd();
  });

  // Filter
  document.getElementById('btn-filter').addEventListener('click', openFilter);
  // Logout
  document.getElementById('btn-logout').addEventListener('click', () => { if(confirm('להתנתק?')) doLogout(); });

  // Event modal
  document.getElementById('event-close').addEventListener('click',  () => closeModal('modal-event'));
  document.getElementById('event-cancel').addEventListener('click', () => closeModal('modal-event'));
  document.getElementById('event-save').addEventListener('click', doSave);
  document.getElementById('f-cat').addEventListener('change', e => { if(e.target.value==='birthday') document.getElementById('f-recur').value='yearly'; });

  // Assign toggle
  document.querySelectorAll('[data-uid]').forEach(el =>
    el.addEventListener('click', () => { S.assigned = el.dataset.uid; updateAssign(); }));

  // Detail modal — close on overlay click
  document.getElementById('modal-detail').addEventListener('click', e => { if(e.target===document.getElementById('modal-detail')) closeModal('modal-detail'); });
  document.getElementById('modal-event').addEventListener('click',  e => { if(e.target===document.getElementById('modal-event'))  closeModal('modal-event'); });

  // Filter modal
  document.getElementById('filter-close').addEventListener('click', () => closeModal('modal-filter'));
  document.getElementById('filter-apply').addEventListener('click', applyFilter);
  document.getElementById('filter-reset').addEventListener('click', () => { resetFilter(); showToast('הסינון אופס'); });
  document.querySelectorAll('[data-fu]').forEach(c => c.addEventListener('click', () => {
    document.querySelectorAll('[data-fu]').forEach(x=>x.classList.remove('on')); c.classList.add('on');
  }));
  document.querySelectorAll('[data-fc]').forEach(c => c.addEventListener('click', () => c.classList.toggle('on')));

  // Shopping item modal
  document.getElementById('shop-item-close').addEventListener('click', () => closeModal('modal-shop-item'));
  document.getElementById('si-cancel').addEventListener('click',       () => closeModal('modal-shop-item'));
  document.getElementById('si-save').addEventListener('click',         saveShopItem);
  document.getElementById('modal-shop-item').addEventListener('click', e => { if(e.target===document.getElementById('modal-shop-item')) closeModal('modal-shop-item'); });

  // Task modal
  document.getElementById('task-close').addEventListener('click', () => closeModal('modal-task'));
  document.getElementById('tk-cancel').addEventListener('click',  () => closeModal('modal-task'));
  document.getElementById('tk-save').addEventListener('click',    saveTask);
  document.getElementById('modal-task').addEventListener('click', e => { if(e.target===document.getElementById('modal-task')) closeModal('modal-task'); });
  document.querySelectorAll('[data-tuid]').forEach(el =>
    el.addEventListener('click', () => { _taskAssign = el.dataset.tuid; updateTaskAssign(); }));

  // Swipe navigation
  let _tx = 0, _ty = 0;
  document.getElementById('main-content').addEventListener('touchstart', e => {
    _tx = e.touches[0].clientX; _ty = e.touches[0].clientY;
  }, {passive:true});
  document.getElementById('main-content').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _tx;
    const dy = e.changedTouches[0].clientY - _ty;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)*1.5) navigate(dx > 0 ? -1 : 1);
  }, {passive:true});
}

// ============================================================
// APP LOAD
// ============================================================
async function loadApp() {
  // Set initial FAB action for calendar
  document.getElementById('btn-add')._sectionAction = openAdd;
  document.getElementById('cal-view').innerHTML = `<div style="padding:50px 0;text-align:center"><div class="spinner"></div><div style="color:var(--text-m);font-size:14px;margin-top:8px">טוען...</div></div>`;
  let evs = await dbFetch();
  if (!evs.length && S.demo) evs = buildDemoEvents();
  S.events = evs;
  setSection('calendar');
  if (S.demo) showToast('מצב דמו — חבר Supabase לשמירה', 4000);
}

// ============================================================
// SERVICE WORKER
// ============================================================
function registerSW() {
  if ('serviceWorker' in navigator)
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initSB();
  registerSW();
  bindEvents();

  // Size pattern lock canvas
  const canvas = document.getElementById('pattern-canvas');
  const sz = Math.min(window.innerWidth - 80, 264);
  canvas.width = canvas.height = sz;
  canvas.style.width = canvas.style.height = sz + 'px';
  window._pl = new PatternLock(canvas);

  checkSession();
});
</script>
